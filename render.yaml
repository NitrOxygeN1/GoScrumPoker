# Render Blueprint — https://render.com/docs/blueprint-spec
# After deploy: create/link a PostgreSQL so DATABASE_URL is set automatically.
# The image serves the Vite app from /app/web (WEB_ROOT) and the API on the same PORT.
# The web service does not need a custom start command; the image entrypoint is /server.

version: "1"
services:
  - type: web
    name: goscrumppoker
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    # Match typical Render / public-URL flow
    plan: free
    envVars:
      - key: ENV
        value: prod
      - key: RUN_MIGRATIONS_ON_STARTUP
        value: "true"
      # Google Cloud project number (NOT project id) used by the Meet Web Add-ons SDK.
      # Find it at https://console.cloud.google.com/iam-admin/settings (same project as the
      # Workspace Marketplace SDK app). Required for Meet to consider the add-on launched —
      # without it, Meet's host shell shows "Failed to launch the add-on".
      - key: GOOGLE_CLOUD_PROJECT_NUMBER
        sync: false
